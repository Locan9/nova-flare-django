{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Saved Recommendations - NovaFlare</title>
  <link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-gray-100">
  <nav class="navbar p-4">
    <a href="{% url 'index' %}" class="mr-4">Home</a>
    <span>Saved Recommendations</span>
  </nav>

  <main class="p-6">
    {% if submissions %}
      <div class="grid gap-4">
        {% for sub in submissions %}
          <div class="p-4 bg-white rounded shadow">
            <div class="text-sm text-gray-500">{{ sub.created_at }}</div>
            <div class="result-display mt-2" style="color: #000;">
              {% autoescape off %}{{ sub.results }}{% endautoescape %}
            </div>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <p>No saved recommendations yet.</p>
    {% endif %}
  </main>
</body>
</html>
